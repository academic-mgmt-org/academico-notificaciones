# Reusable Docker pipeline template for academic microservices.
#
# Usage:
# 1. Copy this file to azure-pipelines.yml in the target microservice.
# 2. Adjust the parameters below for the service name, image repository,
#    compose file, paths, ports and environment variables.
# 3. Create the referenced secret variables in Azure DevOps before running
#    the pipeline. Example: DB_PASSWORD, NOTIFICACIONES_API_KEY, JWT_SECRET.
#
# Runtime model:
# - Build runs on an Azure hosted agent and pushes the image to ACR.
# - Development deploys automatically on this VM through the self-hosted agent.
# - Production waits for ManualValidation and then deploys over SSH.
#
# Compose requirement:
# - The compose file must exist in the repo, usually docker-compose.yml.
# - Its image line should reference the configured imageEnvVariableName. Example:
#     image: ${SERVICE_IMAGE}
# - For single-port services, use PORT from .env. Example:
#     ports:
#       - "${PORT}:${PORT}"

parameters:
- name: dockerRegistryServiceConnection
  type: string
  default: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'

- name: containerRegistry
  type: string
  default: 'acracademicoutn.azurecr.io'

- name: imageRepository
  type: string
  default: 'academicmgmtorgacademicomicroservicio'

- name: containerName
  type: string
  default: 'academico-microservicio'

- name: dockerfilePath
  type: string
  default: '$(Build.SourcesDirectory)/Dockerfile'

- name: vmImageName
  type: string
  default: 'ubuntu-latest'

- name: devAgentPool
  type: string
  default: 'Default'

- name: devAgentName
  type: string
  default: 'self-hosted-agent'

- name: devRemoteAppPath
  type: string
  default: '/home/azureuser/academico-microservicio'

- name: prodSshHost
  type: string
  default: '20.115.132.131'

- name: prodSshUser
  type: string
  default: 'azureuser'

- name: prodRemoteAppPath
  type: string
  default: '/home/azureuser/academico-microservicio'

- name: devComposeFile
  type: string
  default: 'docker-compose.yml'

- name: prodComposeFile
  type: string
  default: 'docker-compose.yml'

- name: servicePort
  type: string
  default: ''

# Name of the .env key used by docker compose for the pushed image.
# The compose file must reference this variable in its image property.
- name: imageEnvVariableName
  type: string
  default: 'SERVICE_IMAGE'

# Space-separated list, in the order to write into the remote .env file.
# PORT and the image variable are intentionally omitted: PORT is read from the
# existing remote .env when present, or from servicePort on first deployment,
# while the image variable is generated from the current Build.BuildId.
# The build also publishes latest for consumers that need the newest image tag.
- name: envVariableNames
  type: string
  default: 'NODE_ENV SERVICE_API_KEY DB_HOST DB_PORT DB_DATABASE DB_USER DB_PASSWORD'

# Values injected into the .env creation step. Use Azure DevOps secret variables
# for sensitive values and plain literals for non-sensitive values.
- name: envVariables
  type: object
  default:
    NODE_ENV: 'production'
    SERVICE_API_KEY: '$(SERVICE_API_KEY)'
    DB_HOST: '$(DB_HOST)'
    DB_PORT: '$(DB_PORT)'
    DB_DATABASE: '$(DB_DATABASE)'
    DB_USER: '$(DB_USER)'
    DB_PASSWORD: '$(DB_PASSWORD)'

- name: productionApprovalNotifyUsers
  type: string
  default: 'gacalderonr@utn.edu.ec'

- name: productionApprovers
  type: string
  default: 'gacalderonr@utn.edu.ec'

- name: productionApprovalInstructions
  type: string
  default: 'Approve to deploy this microservice to production.'

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ${{ parameters.vmImageName }}
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: ${{ parameters.imageRepository }}
        dockerfile: ${{ parameters.dockerfilePath }}
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}
        tags: |
          $(tag)
          latest
        addPipelineData: false

- stage: DeployDevelopment
  displayName: Deploy to development
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployDevelopment
    displayName: Deploy Docker Compose on development server
    pool:
      name: ${{ parameters.devAgentPool }}
      demands:
      - Agent.Name -equals ${{ parameters.devAgentName }}
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [ -z "${!name:-}" ]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        validate_env_name() {
          local name="$1"
          if [[ ! "$name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
            echo "Invalid environment variable name: $name"
            exit 1
          fi
        }

        validate_env_name "$IMAGE_ENV_VARIABLE_NAME"

        for name in $ENV_VARIABLE_NAMES; do
          validate_env_name "$name"
          require_env "$name"
        done

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        ENV_FILE_LOCAL="$(mktemp)"

        cleanup() {
          rm -f "$ENV_FILE_LOCAL"
        }
        trap cleanup EXIT

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        mkdir -p "$REMOTE_APP_PATH"

        echo "Reading development service port..."
        ENV_FILE="$REMOTE_APP_PATH/.env"
        SERVICE_PORT=""
        if [ -f "$ENV_FILE" ]; then
          SERVICE_PORT="$(sed -n 's/^PORT=//p' "$ENV_FILE" | tail -n 1)"
        fi

        if [ -z "$SERVICE_PORT" ]; then
          if [ -z "${DEFAULT_SERVICE_PORT:-}" ]; then
            echo "No PORT found in $ENV_FILE and servicePort was not configured."
            exit 1
          fi
          echo "No PORT found in $ENV_FILE. Using configured servicePort $DEFAULT_SERVICE_PORT."
          SERVICE_PORT="$DEFAULT_SERVICE_PORT"
        fi

        if [[ ! "$SERVICE_PORT" =~ ^[0-9]+$ ]]; then
          echo "Invalid PORT value resolved for development: $SERVICE_PORT"
          exit 1
        fi

        umask 077
        {
          printf '%s=%s\n' "$IMAGE_ENV_VARIABLE_NAME" "$IMAGE"
          printf 'PORT=%s\n' "$SERVICE_PORT"
          for name in $ENV_VARIABLE_NAMES; do
            printf '%s=%s\n' "$name" "${!name}"
          done
        } > "$ENV_FILE_LOCAL"

        echo "Updating development .env and compose file..."
        mv "$ENV_FILE_LOCAL" "$REMOTE_APP_PATH/.env.pipeline"
        mv "$REMOTE_APP_PATH/.env.pipeline" "$REMOTE_APP_PATH/.env"
        chmod 600 "$REMOTE_APP_PATH/.env"
        cp "$COMPOSE_SOURCE_FILE" "$REMOTE_APP_PATH/$DEV_COMPOSE_FILE"

        cd "$REMOTE_APP_PATH"

        container_is_running() {
          docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"
        }

        show_port_usage() {
          local service_port=""
          if [ -f .env ]; then
            service_port="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
          fi

          if [ -n "$service_port" ]; then
            echo "Containers publishing port $service_port:"
            docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' | awk -v port="$service_port" 'NR == 1 || index($0, ":" port "->") > 0'
          fi
        }

        start_compose() {
          local compose_file="$1"
          if ! docker compose -f "$compose_file" up -d --remove-orphans; then
            echo "Docker Compose reported a startup error. Waiting before checking container state..."
            sleep 8
            if container_is_running; then
              echo "Container $CONTAINER_NAME is running after the startup error; continuing."
              return 0
            fi

            show_port_usage
            return 1
          fi
        }

        if [ -f docker-compose.yml ]; then
          echo "Stopping current compose project..."
          docker compose -f docker-compose.yml down --remove-orphans || true
        fi

        echo "Stopping previous pipeline compose project..."
        docker compose -f "$DEV_COMPOSE_FILE" down --remove-orphans || true

        echo "Pulling development image..."
        docker compose -f "$DEV_COMPOSE_FILE" pull

        echo "Starting development compose project..."
        start_compose "$DEV_COMPOSE_FILE"

        echo "Verifying container is running..."
        sleep 8
        if ! container_is_running; then
          echo "Container $CONTAINER_NAME did not stay running."
          show_port_usage
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          docker logs --tail 200 "$CONTAINER_NAME" || true
          exit 1
        fi

        docker compose -f "$DEV_COMPOSE_FILE" ps

        echo "Cleaning up dangling images..."
        docker image prune -f

        echo "Development deployment completed."
      displayName: Deploy to development with Docker Compose
      env:
        CONTAINER_REGISTRY: ${{ parameters.containerRegistry }}
        IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
        TAG: $(tag)
        CONTAINER_NAME: ${{ parameters.containerName }}
        REMOTE_APP_PATH: ${{ parameters.devRemoteAppPath }}
        DEV_COMPOSE_FILE: ${{ parameters.devComposeFile }}
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/${{ parameters.devComposeFile }}
        IMAGE_ENV_VARIABLE_NAME: ${{ parameters.imageEnvVariableName }}
        ENV_VARIABLE_NAMES: ${{ parameters.envVariableNames }}
        DEFAULT_SERVICE_PORT: '${{ parameters.servicePort }}'
        ${{ each envVar in parameters.envVariables }}:
          ${{ envVar.key }}: ${{ envVar.value }}

- stage: ApproveProduction
  displayName: Approve production deployment
  dependsOn: DeployDevelopment
  condition: succeeded()
  jobs:
  - job: WaitForProductionApproval
    displayName: Await production approval
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@1
      displayName: Approve production deployment
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: ${{ parameters.productionApprovalNotifyUsers }}
        approvers: ${{ parameters.productionApprovers }}
        allowApproversToApproveTheirOwnRuns: true
        instructions: ${{ parameters.productionApprovalInstructions }}
        onTimeout: reject

- stage: DeployProduction
  displayName: Deploy to production
  dependsOn: ApproveProduction
  condition: succeeded()
  jobs:
  - job: DeployProduction
    displayName: Deploy Docker Compose on production server
    pool:
      vmImage: ${{ parameters.vmImageName }}
    steps:
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: ${{ parameters.dockerRegistryServiceConnection }}

    - script: |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [ -z "${!name:-}" ]; then
            echo "Missing required environment variable: $name"
            exit 1
          fi
        }

        validate_env_name() {
          local name="$1"
          if [[ ! "$name" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
            echo "Invalid environment variable name: $name"
            exit 1
          fi
        }

        require_env PROD_SSH_PRIVATE_KEY_B64
        validate_env_name "$IMAGE_ENV_VARIABLE_NAME"

        for name in $ENV_VARIABLE_NAMES; do
          validate_env_name "$name"
          require_env "$name"
        done

        IMAGE="${CONTAINER_REGISTRY}/${IMAGE_REPOSITORY}:${TAG}"
        SSH_DIR="$(mktemp -d)"
        ENV_FILE_LOCAL="$(mktemp)"

        cleanup() {
          rm -rf "$SSH_DIR" "$ENV_FILE_LOCAL"
        }
        trap cleanup EXIT

        if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
          echo "Missing compose source file: $COMPOSE_SOURCE_FILE"
          exit 1
        fi

        mkdir -p "$SSH_DIR"
        chmod 700 "$SSH_DIR"
        printf '%s' "$PROD_SSH_PRIVATE_KEY_B64" | base64 -d > "$SSH_DIR/key"
        chmod 600 "$SSH_DIR/key"
        ssh-keyscan -T 10 "$PROD_SSH_HOST" > "$SSH_DIR/known_hosts"

        SSH_OPTS=(
          -i "$SSH_DIR/key"
          -o IdentitiesOnly=yes
          -o UserKnownHostsFile="$SSH_DIR/known_hosts"
          -o StrictHostKeyChecking=yes
        )
        REMOTE="${PROD_SSH_USER}@${PROD_SSH_HOST}"

        DOCKER_CONFIG_FILE="${DOCKER_CONFIG:-$HOME/.docker}/config.json"
        if [ ! -f "$DOCKER_CONFIG_FILE" ]; then
          echo "Missing Docker config after ACR login: $DOCKER_CONFIG_FILE"
          exit 1
        fi

        echo "Copying ACR Docker login to production server..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p ~/.docker && umask 077 && cat > ~/.docker/config.json" < "$DOCKER_CONFIG_FILE"

        echo "Reading production service port..."
        SERVICE_PORT="$(
          ssh "${SSH_OPTS[@]}" "$REMOTE" \
            "set -eu; ENV_FILE='$REMOTE_APP_PATH/.env'; DEFAULT_SERVICE_PORT='$DEFAULT_SERVICE_PORT'; SERVICE_PORT=''; if [ -f \"\$ENV_FILE\" ]; then SERVICE_PORT=\$(sed -n 's/^PORT=//p' \"\$ENV_FILE\" | tail -n 1); fi; if [ -z \"\$SERVICE_PORT\" ]; then if [ -z \"\$DEFAULT_SERVICE_PORT\" ]; then echo \"No PORT found in \$ENV_FILE and servicePort was not configured.\" >&2; exit 1; fi; echo \"No PORT found in \$ENV_FILE. Using configured servicePort \$DEFAULT_SERVICE_PORT.\" >&2; SERVICE_PORT=\"\$DEFAULT_SERVICE_PORT\"; fi; printf '%s\n' \"\$SERVICE_PORT\""
        )"

        if [[ ! "$SERVICE_PORT" =~ ^[0-9]+$ ]]; then
          echo "Invalid PORT value resolved for production: $SERVICE_PORT"
          exit 1
        fi

        umask 077
        {
          printf '%s=%s\n' "$IMAGE_ENV_VARIABLE_NAME" "$IMAGE"
          printf 'PORT=%s\n' "$SERVICE_PORT"
          for name in $ENV_VARIABLE_NAMES; do
            printf '%s=%s\n' "$name" "${!name}"
          done
        } > "$ENV_FILE_LOCAL"

        echo "Updating production .env and compose file..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p '$REMOTE_APP_PATH' && umask 077 && cat > '$REMOTE_APP_PATH/.env.pipeline'" < "$ENV_FILE_LOCAL"
        ssh "${SSH_OPTS[@]}" "$REMOTE" "mv '$REMOTE_APP_PATH/.env.pipeline' '$REMOTE_APP_PATH/.env' && chmod 600 '$REMOTE_APP_PATH/.env'"
        ssh "${SSH_OPTS[@]}" "$REMOTE" "cat > '$REMOTE_APP_PATH/$PROD_COMPOSE_FILE'" < "$COMPOSE_SOURCE_FILE"

        echo "Deploying with Docker Compose..."
        ssh "${SSH_OPTS[@]}" "$REMOTE" \
          "REMOTE_APP_PATH='$REMOTE_APP_PATH' PROD_COMPOSE_FILE='$PROD_COMPOSE_FILE' CONTAINER_NAME='$CONTAINER_NAME' bash -se" << 'REMOTE_SCRIPT'
        set -euo pipefail

        cd "$REMOTE_APP_PATH"

        container_is_running() {
          docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"
        }

        show_port_usage() {
          local service_port=""
          if [ -f .env ]; then
            service_port="$(sed -n 's/^PORT=//p' .env | tail -n 1 || true)"
          fi

          if [ -n "$service_port" ]; then
            echo "Containers publishing port $service_port:"
            docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Ports}}' | awk -v port="$service_port" 'NR == 1 || index($0, ":" port "->") > 0'
          fi
        }

        start_compose() {
          local compose_file="$1"
          if ! docker compose -f "$compose_file" up -d --remove-orphans; then
            echo "Docker Compose reported a startup error. Waiting before checking container state..."
            sleep 8
            if container_is_running; then
              echo "Container $CONTAINER_NAME is running after the startup error; continuing."
              return 0
            fi

            show_port_usage
            return 1
          fi
        }

        if [ -f docker-compose.yml ]; then
          echo "Stopping current compose project..."
          docker compose -f docker-compose.yml down --remove-orphans || true
        fi

        echo "Stopping previous pipeline compose project..."
        docker compose -f "$PROD_COMPOSE_FILE" down --remove-orphans || true

        echo "Pulling production image..."
        docker compose -f "$PROD_COMPOSE_FILE" pull

        echo "Starting production compose project..."
        start_compose "$PROD_COMPOSE_FILE"

        echo "Verifying container is running..."
        sleep 8
        if ! container_is_running; then
          echo "Container $CONTAINER_NAME did not stay running."
          show_port_usage
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          docker logs --tail 200 "$CONTAINER_NAME" || true
          exit 1
        fi

        docker compose -f "$PROD_COMPOSE_FILE" ps

        echo "Cleaning up dangling images..."
        docker image prune -f

        echo "Production deployment completed."
        REMOTE_SCRIPT
      displayName: Deploy to production with Docker Compose
      env:
        CONTAINER_REGISTRY: ${{ parameters.containerRegistry }}
        IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
        TAG: $(tag)
        CONTAINER_NAME: ${{ parameters.containerName }}
        PROD_SSH_HOST: ${{ parameters.prodSshHost }}
        PROD_SSH_USER: ${{ parameters.prodSshUser }}
        REMOTE_APP_PATH: ${{ parameters.prodRemoteAppPath }}
        PROD_COMPOSE_FILE: ${{ parameters.prodComposeFile }}
        COMPOSE_SOURCE_FILE: $(Build.SourcesDirectory)/${{ parameters.prodComposeFile }}
        IMAGE_ENV_VARIABLE_NAME: ${{ parameters.imageEnvVariableName }}
        ENV_VARIABLE_NAMES: ${{ parameters.envVariableNames }}
        DEFAULT_SERVICE_PORT: '${{ parameters.servicePort }}'
        PROD_SSH_PRIVATE_KEY_B64: $(PROD_SSH_PRIVATE_KEY_B64)
        ${{ each envVar in parameters.envVariables }}:
          ${{ envVar.key }}: ${{ envVar.value }}

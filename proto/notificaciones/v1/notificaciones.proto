syntax = "proto3";

package notificaciones.v1;

message Notification {
  string id = 1;
  string usuario_id = 2;
  string titulo = 3;
  string mensaje = 4;
  string tipo = 5;
  string canal = 6;
  string prioridad = 7;
  string estado = 8;
  bool leida = 9;
  string icon_id = 10;
  string creado_en = 11;
  string leido_en = 12;
}

message ListNotificationsRequest {
  string usuario_id = 1;
  string estado = 2;
  int32 limit = 3;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  int32 unread_count = 2;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string timestamp = 3;
  double uptime = 4;
}

message ReadyRequest {}

message ReadyResponse {
  bool ready = 1;
  string timestamp = 2;
}

message LiveRequest {}

message LiveResponse {
  bool alive = 1;
  string timestamp = 2;
  double uptime = 3;
}

message CountUnreadRequest {
  string usuario_id = 1;
}

message CountUnreadResponse {
  int32 unread_count = 1;
}

message CreateNotificationRequest {
  string usuario_id = 1;
  string email = 2;
  string identificacion = 3;
  string titulo = 4;
  string mensaje = 5;
  string tipo = 6;
  string canal = 7;
  string prioridad = 8;
  string icon_id = 9;
}

message NotificationResponse {
  bool success = 1;
  Notification notification = 2;
}

message MarkReadRequest {
  string id = 1;
  string usuario_id = 2;
}

message MarkAllReadRequest {
  string usuario_id = 1;
}

message GenericResponse {
  bool success = 1;
  string message = 2;
  int32 affected = 3;
}

message EmailMetadata {
  string key = 1;
  string value = 2;
}

message SendEmailRequest {
  string usuario_id = 1;
  string to_email = 2;
  string to_name = 3;
  string subject = 4;
  string plain_text = 5;
  string html = 6;
  string tipo = 7;
  string prioridad = 8;
  string source = 9;
  repeated EmailMetadata metadata = 10;
}

message SendEmailResponse {
  bool success = 1;
  string message = 2;
  string provider = 3;
  string message_id = 4;
}

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse) {}
  rpc RecentNotifications(ListNotificationsRequest) returns (ListNotificationsResponse) {}
  rpc CountUnread(CountUnreadRequest) returns (CountUnreadResponse) {}
  rpc CreateNotification(CreateNotificationRequest) returns (NotificationResponse) {}
  rpc MarkAsRead(MarkReadRequest) returns (NotificationResponse) {}
  rpc MarkAllAsRead(MarkAllReadRequest) returns (GenericResponse) {}
}

service EmailService {
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse) {}
}

service HealthService {
  rpc Health(HealthRequest) returns (HealthResponse) {}
  rpc Ready(ReadyRequest) returns (ReadyResponse) {}
  rpc Live(LiveRequest) returns (LiveResponse) {}
}
